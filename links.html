<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyanite Studio — Links</title>
    <meta name="description" content="Cyanite Studio — Cyanotype workshops in Jakarta. Book a session, follow our work, get in touch.">
    <meta property="og:title" content="Cyanite Studio — Links">
    <meta property="og:description" content="Cyanotype workshops in Jakarta. Book a session, follow our work.">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --prussian: #003153;
            --prussian-deep: #001a2e;
            --cream: #f5f0e8;
            --cream-dark: #e8e0d4;
            --gold: #c9a96e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--prussian-deep);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1.5rem;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.03;
            z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--prussian) 0%, #2a7ab5 100%);
            margin: 0 auto 1.5rem;
            border: 2px solid rgba(245, 240, 232, 0.1);
        }

        .brand {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            color: var(--cream);
            margin-bottom: 0.4rem;
            font-weight: 400;
        }

        .tagline {
            font-size: 0.8rem;
            color: var(--cream);
            opacity: 0.5;
            margin-bottom: 2.5rem;
            line-height: 1.5;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .link-item {
            display: block;
            padding: 1rem 1.5rem;
            background: rgba(245, 240, 232, 0.04);
            border: 1px solid rgba(245, 240, 232, 0.1);
            border-radius: 2px;
            color: var(--cream);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            transition: all 0.25s ease;
        }

        .link-item:hover {
            background: rgba(245, 240, 232, 0.08);
            border-color: var(--gold);
            transform: translateY(-1px);
        }

        .link-item.primary {
            background: var(--cream);
            color: var(--prussian-deep);
            border-color: var(--cream);
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .link-item.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(245, 240, 232, 0.15);
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.7rem;
            color: var(--cream);
            opacity: 0.25;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar"></div>
        <h1 class="brand">Cyanite Studio</h1>
        <p class="tagline">Cyanotype workshops in Jakarta.<br>Printing with sunlight since 1842.</p>

        <div class="links">
            <a href="/" class="link-item primary">Book a Workshop</a>
            <a href="/#workshops" class="link-item">Workshop Formats & Pricing</a>
            <a href="/#process" class="link-item">How Cyanotype Works</a>
            <a href="https://www.instagram.com/cyanite.studio/" class="link-item">Instagram</a>
            <a href="mailto:hello@cyanite.studio" class="link-item">Email Us</a>
        </div>

        <p class="footer">Cyanite Studio &copy; 2026</p>
    </div>
</body>
</html>
